<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>スケジュール管理</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4A90D9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="スケジュール">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <h1>📅 スケジュール管理</h1>
    <div class="header-icons">
      <button class="header-btn" id="notif-btn" title="通知" style="position:relative">
        🔔
        <span class="notif-badge hidden" id="notif-badge">0</span>
      </button>
    </div>
  </header>

  <div id="toast-container"></div>

  <div class="container">
    <!-- カレンダー -->
    <div class="card" id="calendar-card">
      <div class="calendar-header">
        <button class="cal-nav-btn" id="prev-month">‹</button>
        <span class="calendar-title" id="calendar-title"></span>
        <button class="cal-nav-btn" id="next-month">›</button>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </div>

    <!-- 選択日のタスク -->
    <div id="day-section">
      <div class="card">
        <div class="section-title">
          <span id="day-label">今日のタスク</span>
          <button class="btn btn-primary btn-sm" id="add-task-btn">＋ 追加</button>
        </div>
        <div class="task-list" id="task-list">
          <div class="empty-state">
            <div class="icon">📋</div>
            <p>タスクがありません</p>
          </div>
        </div>
      </div>

      <!-- 定期タスク（選択日） -->
      <div class="card" id="recurring-today-card">
        <div class="section-title">🔄 定期タスク</div>
        <div class="task-list" id="recurring-today-list">
          <div class="empty-state">
            <div class="icon">🔄</div>
            <p>定期タスクなし</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- タスク追加モーダル -->
  <div class="modal-overlay hidden" id="add-task-modal">
    <div class="modal">
      <div class="modal-title">タスクを追加</div>
      <div class="add-task-form">
        <input type="text" id="new-task-title" placeholder="タスク名 *" maxlength="200">
        <textarea id="new-task-desc" placeholder="詳細（任意）" rows="2"></textarea>
        <input type="date" id="new-task-date">
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="cancel-add-task">キャンセル</button>
        <button class="btn btn-primary" id="submit-add-task">追加</button>
      </div>
    </div>
  </div>

  <!-- 通知モーダル -->
  <div class="modal-overlay hidden center" id="notif-modal">
    <div class="modal">
      <div class="modal-title">📬 期日接近タスク</div>
      <div id="notif-list"></div>
      <div class="modal-actions">
        <button class="btn btn-outline btn-full" id="close-notif-modal">閉じる</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item active">
      <span class="icon">📅</span>
      <span>カレンダー</span>
    </a>
    <a href="completed.html" class="nav-item">
      <span class="icon">✅</span>
      <span>完了済み</span>
    </a>
    <a href="recurring.html" class="nav-item">
      <span class="icon">🔄</span>
      <span>定期タスク</span>
    </a>
    <a href="settings.html" class="nav-item">
      <span class="icon">⚙️</span>
      <span>設定</span>
    </a>
  </nav>

  <script src="js/app.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/email-notify.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/notify.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 起動時に定期メール自動チェック（設定済みの場合のみ送信）
      checkAndSendScheduleMail();
    });
  </script>
</body>
</html>
