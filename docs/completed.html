<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>完了済みタスク - スケジュール管理</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4A90D9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="スケジュール">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <h1>✅ 完了済みタスク</h1>
  </header>

  <div id="toast-container"></div>

  <div class="container">
    <div class="card">
      <div class="section-title">完了したタスク一覧</div>
      <div id="completed-list">
        <div class="empty-state">
          <div class="icon">✅</div>
          <p>完了済みタスクはありません</p>
        </div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <span class="icon">📅</span>
      <span>カレンダー</span>
    </a>
    <a href="completed.html" class="nav-item active">
      <span class="icon">✅</span>
      <span>完了済み</span>
    </a>
    <a href="recurring.html" class="nav-item">
      <span class="icon">🔄</span>
      <span>定期タスク</span>
    </a>
    <a href="settings.html" class="nav-item">
      <span class="icon">⚙️</span>
      <span>設定</span>
    </a>
  </nav>

  <script src="js/app.js"></script>
  <script src="js/storage.js"></script>
  <script>
    function renderCompleted() {
      const list = document.getElementById('completed-list');
      const tasks = getCompletedTasks();
      if (!tasks.length) {
        list.innerHTML = '<div class="empty-state"><div class="icon">✅</div><p>完了済みタスクはありません</p></div>';
        return;
      }
      list.innerHTML = tasks.map(t => `
        <div class="task-item completed" data-id="${t.id}">
          <div class="task-check done">✓</div>
          <div class="task-body">
            <div class="task-title">${escapeHtml(t.title)}</div>
            <div class="task-meta">
              📅 ${t.date}
              ${t.completed_at ? ` ✅ ${t.completed_at.slice(0,16)}` : ''}
            </div>
            ${t.description ? `<div class="task-meta">${escapeHtml(t.description)}</div>` : ''}
          </div>
          <button class="btn btn-outline btn-sm" data-undo="${t.id}" style="white-space:nowrap;flex-shrink:0;">↩ 復帰</button>
        </div>
      `).join('');

      list.querySelectorAll('[data-undo]').forEach(btn => {
        btn.addEventListener('click', () => {
          uncompleteTask(btn.dataset.undo);
          showToast('タスクを未完了に戻しました', 'info');
          renderCompleted();
        });
      });
    }

    document.addEventListener('DOMContentLoaded', renderCompleted);
  </script>
</body>
</html>
