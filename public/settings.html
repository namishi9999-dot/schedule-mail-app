<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>設定 - スケジュール管理</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4A90D9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="スケジュール">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="app-header">
    <h1>⚙️ 設定</h1>
  </header>

  <div id="toast-container"></div>

  <div class="container">
    <div class="card">
      <div class="modal-title">Gmail設定 <span id="gmail-configured-badge" class="hidden" style="font-size:0.75em; background:#e6f4ea; color:#1a7f37; border-radius:4px; padding:2px 8px; margin-left:8px; vertical-align:middle;">設定済み ✅</span></div>
      <p class="text-muted" style="margin-bottom:16px;">
        メール通知にGmailのアプリパスワードを使用します。<br>
        <a href="https://myaccount.google.com/apppasswords" target="_blank">Googleアカウント → アプリパスワード</a>で発行してください。
      </p>

      <div class="setting-row">
        <label class="setting-label" for="gmail-user">Gmailアドレス</label>
        <input type="email" id="gmail-user" placeholder="your@gmail.com">
      </div>

      <div class="setting-row">
        <label class="setting-label" for="gmail-pass">アプリパスワード</label>
        <input type="password" id="gmail-pass" placeholder="xxxx xxxx xxxx xxxx">
        <span class="setting-hint">16文字のGoogleアプリパスワード（スペース不要）</span>
      </div>

      <div class="form-row mt-8">
        <button class="btn btn-primary" id="save-settings-btn">💾 保存</button>
        <button class="btn btn-outline" id="test-mail-btn">📧 テスト送信</button>
      </div>
    </div>

    <div class="card">
      <div class="modal-title">アプリについて</div>
      <p class="text-muted">
        スケジュール管理・定期タスク・メール通知アプリ<br>
        PWA対応（ホーム画面に追加可能）<br>
        バックエンド: Node.js + Express + SQLite<br>
        デプロイ: Railway
      </p>
      <div id="install-prompt-area" class="mt-8 hidden">
        <button class="btn btn-primary btn-full" id="install-pwa-btn">📱 ホーム画面に追加</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="/" class="nav-item">
      <span class="icon">📅</span>
      <span>カレンダー</span>
    </a>
    <a href="/completed.html" class="nav-item">
      <span class="icon">✅</span>
      <span>完了済み</span>
    </a>
    <a href="/recurring.html" class="nav-item">
      <span class="icon">🔄</span>
      <span>定期タスク</span>
    </a>
    <a href="/settings.html" class="nav-item active">
      <span class="icon">⚙️</span>
      <span>設定</span>
    </a>
  </nav>

  <script src="/js/app.js"></script>
  <script src="/js/settings.js"></script>
</body>
</html>
