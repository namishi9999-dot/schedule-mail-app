<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>定期タスク - スケジュール管理</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4A90D9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="スケジュール">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="app-header">
    <h1>🔄 定期タスク</h1>
    <div class="header-icons">
      <button class="header-btn" id="add-recurring-btn" title="追加">＋</button>
    </div>
  </header>

  <div id="toast-container"></div>

  <div class="container">
    <div class="card">
      <div class="section-title">定期タスク一覧</div>
      <div id="recurring-list">
        <div class="empty-state">
          <div class="icon">🔄</div>
          <p>定期タスクがありません</p>
          <button class="btn btn-primary mt-8" id="add-recurring-empty-btn">＋ 追加する</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 定期タスク追加/編集モーダル -->
  <div class="modal-overlay hidden" id="recurring-modal">
    <div class="modal">
      <div class="modal-title" id="recurring-modal-title">定期タスクを追加</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <input type="hidden" id="edit-recurring-id">
        <input type="text" id="rt-title" placeholder="タスク名 *" maxlength="200">
        <input type="url" id="rt-link" placeholder="URL（任意）">
        <textarea id="rt-desc" placeholder="詳細（任意）" rows="2"></textarea>
        <div class="form-row">
          <div style="flex:1;">
            <label class="setting-label">繰り返し間隔</label>
            <select id="rt-interval">
              <option value="daily">毎日</option>
              <option value="weekly">毎週</option>
              <option value="biweekly">隔週（2週ごと）</option>
              <option value="3weekly">3週ごと</option>
              <option value="monthly" selected>毎月</option>
              <option value="2monthly">2ヶ月ごと</option>
              <option value="3monthly">3ヶ月ごと</option>
              <option value="halfyear">半年ごと</option>
            </select>
          </div>
          <div style="flex:1;">
            <label class="setting-label">開始日</label>
            <input type="date" id="rt-start">
          </div>
        </div>
        <div>
          <label class="setting-label">事前通知（何日前）</label>
          <input type="number" id="rt-notify" min="0" max="30" value="3">
        </div>
      </div>

      <!-- メールスケジュール設定 -->
      <div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border);">
        <div class="section-title">📧 メール通知設定</div>
        <div id="email-schedule-section" style="display:flex;flex-direction:column;gap:8px;">
          <div class="form-row">
            <div style="flex:2;">
              <label class="setting-label">送信先メール</label>
              <input type="email" id="es-email" placeholder="example@gmail.com">
            </div>
          </div>
          <div class="form-row">
            <div style="flex:1;">
              <label class="setting-label">送信頻度</label>
              <select id="es-freq">
                <option value="">送信しない</option>
                <option value="daily">毎日</option>
                <option value="weekly">毎週（曜日指定）</option>
                <option value="monthly-date">毎月（日付指定）</option>
                <option value="monthly-nth">毎月（第N曜日）</option>
              </select>
            </div>
            <div style="flex:1;">
              <label class="setting-label">送信時刻</label>
              <input type="time" id="es-time" value="09:00">
            </div>
          </div>
          <div id="es-weekly-opts" class="hidden">
            <label class="setting-label">曜日</label>
            <select id="es-dow">
              <option value="0">日曜日</option>
              <option value="1">月曜日</option>
              <option value="2">火曜日</option>
              <option value="3">水曜日</option>
              <option value="4">木曜日</option>
              <option value="5">金曜日</option>
              <option value="6">土曜日</option>
            </select>
          </div>
          <div id="es-monthly-date-opts" class="hidden">
            <label class="setting-label">日付（1〜28）</label>
            <input type="number" id="es-dom" min="1" max="28" value="1">
          </div>
          <div id="es-monthly-nth-opts" class="hidden" style="display:none;gap:8px;">
            <div class="form-row">
              <div style="flex:1;">
                <label class="setting-label">第N週</label>
                <select id="es-nth">
                  <option value="1">第1</option>
                  <option value="2">第2</option>
                  <option value="3">第3</option>
                  <option value="4">第4</option>
                </select>
              </div>
              <div style="flex:1;">
                <label class="setting-label">曜日</label>
                <select id="es-weekday">
                  <option value="0">日曜日</option>
                  <option value="1">月曜日</option>
                  <option value="2">火曜日</option>
                  <option value="3">水曜日</option>
                  <option value="4">木曜日</option>
                  <option value="5">金曜日</option>
                  <option value="6">土曜日</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-outline" id="cancel-recurring">キャンセル</button>
        <button class="btn btn-primary" id="submit-recurring">保存</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="/" class="nav-item">
      <span class="icon">📅</span>
      <span>カレンダー</span>
    </a>
    <a href="/completed.html" class="nav-item">
      <span class="icon">✅</span>
      <span>完了済み</span>
    </a>
    <a href="/recurring.html" class="nav-item active">
      <span class="icon">🔄</span>
      <span>定期タスク</span>
    </a>
    <a href="/settings.html" class="nav-item">
      <span class="icon">⚙️</span>
      <span>設定</span>
    </a>
  </nav>

  <script src="/js/app.js"></script>
  <script src="/js/recurring.js"></script>
</body>
</html>
